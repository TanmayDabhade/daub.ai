<html lang="en">

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>

<script type="text/babel">
const D = window.DAUB_DATA;
const M = D.meta;

const TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "rose",
  "density": "comfortable",
  "showPulse": true
}/*EDITMODE-END*/;

const ACCENT_MAP = {
  indigo: { "--accent":"#8b5cf6","--accent-d":"#6d42d1","--accent-hi":"#b39aff","--accent-bg":"rgba(139,92,246,0.12)" },
  teal:   { "--accent":"#22d3ee","--accent-d":"#0891b2","--accent-hi":"#67e8f9","--accent-bg":"rgba(34,211,238,0.12)" },
  lime:   { "--accent":"#a3e635","--accent-d":"#65a30d","--accent-hi":"#bef264","--accent-bg":"rgba(163,230,53,0.12)" },
  rose:   { "--accent":"#fb7185","--accent-d":"#e11d48","--accent-hi":"#fda4af","--accent-bg":"rgba(251,113,133,0.12)" },
};

/* ─── Primitives ─────────────────────────────────────────────────────── */
function Card({ title, sub, right, chips, children, style, bodyStyle }) {
  return (
    <div className="card" style={style}>
      {(title || right) && (
        <div className="card-head">
          {title && <h3>{title}</h3>}
          {sub && <span className="sub">{sub}</span>}
          {chips && chips.map((c,i) => <span key={i} className="chip">{c}</span>)}
          <span className="spacer"/>
          {right}
        </div>
      )}
      <div style={{ ...bodyStyle }}>{children}</div>
    </div>
  );
}

function Sparkline({ data, w=70, h=20, color="auto", fill=true }) {
  if (!data || data.length<2) return null;
  const min=Math.min(...data), max=Math.max(...data), rng=max-min||1;
  const pts = data.map((v,i)=>[(i/(data.length-1))*w, h-((v-min)/rng)*h]);
  const last=data[data.length-1], first=data[0];
  const c = color==="auto" ? (last>=first?"var(--up)":"var(--down)") : color;
  const polyline = pts.map(p=>p.map(n=>n.toFixed(1)).join(",")).join(" ");
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{ display:"block" }}>
      {fill && <polygon points={`0,${h} ${polyline} ${w},${h}`} fill={c} opacity="0.15"/>}
      <polyline points={polyline} fill="none" stroke={c} strokeWidth="1.25" strokeLinejoin="round"/>
    </svg>
  );
}

function LineChart({ data, h=180 }) {
  const w=600, pad={l:40,r:10,t:10,b:22};
  const min=Math.min(...data), max=Math.max(...data), rng=max-min||1;
  const xStep=(w-pad.l-pad.r)/(data.length-1);
  const pts=data.map((v,i)=>[pad.l+i*xStep, pad.t+(h-pad.t-pad.b)-((v-min)/rng)*(h-pad.t-pad.b)]);
  const last=data[data.length-1], first=data[0], up=last>=first;
  const color = up?"var(--up)":"var(--down)";
  const polyline = pts.map(p=>p.map(n=>n.toFixed(1)).join(",")).join(" ");
  const area = `${pad.l},${h-pad.b} ${polyline} ${w-pad.r},${h-pad.b}`;
  const ticks = [0,0.25,0.5,0.75,1].map(t=>min+rng*t);
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h} preserveAspectRatio="none" style={{ display:"block" }}>
      <defs>
        <linearGradient id="lcg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={up?"#34d399":"#f87171"} stopOpacity="0.28"/>
          <stop offset="100%" stopColor={up?"#34d399":"#f87171"} stopOpacity="0"/>
        </linearGradient>
      </defs>
      {ticks.map((t,i)=>{
        const y=pad.t+(h-pad.t-pad.b)-((t-min)/rng)*(h-pad.t-pad.b);
        return (
          <g key={i}>
            <line x1={pad.l} x2={w-pad.r} y1={y} y2={y} stroke="var(--line)" strokeDasharray="2 4" opacity="0.5"/>
            <text x={pad.l-6} y={y+3} textAnchor="end" fontSize="9" fill="var(--fg-mute)" fontFamily="var(--mono)">
              ${(t/1000).toFixed(1)}k
            </text>
          </g>
        );
      })}
      <polygon points={area} fill="url(#lcg)"/>
      <polyline points={polyline} fill="none" stroke={color} strokeWidth="1.75" strokeLinejoin="round"/>
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="3" fill={color}/>
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="6" fill={color} opacity="0.2"/>
    </svg>
  );
}

function Donut({ slices, size=130, inner=40 }) {
  const total=slices.reduce((s,x)=>s+x.v,0);
  let acc=0;
  const r=size/2-8, cx=size/2, cy=size/2;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {slices.map((s,i)=>{
        const pct=s.v/total, start=acc; acc+=pct;
        const a1=start*2*Math.PI-Math.PI/2, a2=(start+pct)*2*Math.PI-Math.PI/2;
        const large=pct>0.5?1:0;
        const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
        const x2=cx+r*Math.cos(a2), y2=cy+r*Math.sin(a2);
        return <path key={i} d={`M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`} fill="none" stroke={s.c} strokeWidth={inner/2.5}/>;
      })}
      <text x={cx} y={cy-2} textAnchor="middle" fontSize="11" fill="var(--fg-mute)" fontFamily="var(--sans)">Total</text>
      <text x={cx} y={cy+14} textAnchor="middle" fontSize="14" fontWeight="600" fill="var(--fg)" fontFamily="var(--mono)">
        ${(total/1000).toFixed(0)}k
      </text>
    </svg>
  );
}

function Gauge({ value, label }) {
  const w=180, h=100, cx=w/2, cy=h-10, r=72;
  const pct=value/100;
  const a=Math.PI+pct*Math.PI;
  const px=cx+r*Math.cos(a), py=cy+r*Math.sin(a);
  const arcs=[];
  const colors=["#f87171","#fb923c","#f59e0b","#a3e635","#34d399"];
  for (let i=0;i<5;i++){
    const a1=Math.PI+(i/5)*Math.PI, a2=Math.PI+((i+1)/5)*Math.PI;
    arcs.push(
      <path key={i}
        d={`M ${cx+r*Math.cos(a1)} ${cy+r*Math.sin(a1)} A ${r} ${r} 0 0 1 ${cx+r*Math.cos(a2)} ${cy+r*Math.sin(a2)}`}
        fill="none" stroke={colors[i]} strokeWidth="8" strokeLinecap="butt" opacity="0.85"/>
    );
  }
  return (
    <svg width={w} height={h+22} viewBox={`0 0 ${w} ${h+22}`}>
      {arcs}
      <line x1={cx} y1={cy} x2={px} y2={py} stroke="var(--fg)" strokeWidth="2" strokeLinecap="round"/>
      <circle cx={cx} cy={cy} r="4" fill="var(--fg)"/>
      <text x={cx} y={h+15} textAnchor="middle" fontSize="11" fill="var(--fg-dim)" fontFamily="var(--sans)">{label}</text>
    </svg>
  );
}

function ConfBar({ v, w=52 }) {
  const col = v>=0.8?"var(--up)":v>=0.65?"var(--accent)":"var(--down)";
  return (
    <div style={{ display:"inline-flex", alignItems:"center", gap:6 }}>
      <div className="bar" style={{ width:w }}>
        <div className="bar-inner" style={{ width:`${v*100}%`, background:col }}/>
      </div>
      <span className="mono" style={{ fontSize:10.5, color:col }}>{v.toFixed(2)}</span>
    </div>
  );
}

function Swatch({ sect }) {
  const m = { tech:"var(--s-tech)", fin:"var(--s-fin)", hlth:"var(--s-hlth)",
              indu:"var(--s-indu)", cons:"var(--s-cons)", ener:"var(--s-ener)", def:"var(--s-def)" };
  return <span style={{ display:"inline-block", width:3, height:18, borderRadius:2, background:m[sect]||"var(--fg-mute)" }}/>;
}

/* ─── Sidebar ────────────────────────────────────────────────────────── */
function Sidebar({ route, setRoute }) {
  const groups = [
    { g:"Workspace", items:[
      { k:"home",   l:"Dashboard",   i:"◉" },
      { k:"signal", l:"Signal Desk", i:"◆" },
      { k:"agents", l:"Agent Swarm", i:"◇" },
    ]},
    { g:"Research", items:[
      { k:"rsrch",  l:"Research",    i:"◈" },
      { k:"risk",   l:"Risk Radar",  i:"◐" },
      { k:"screen", l:"Screener",    i:"▣" },
    ]},
    { g:"Execution", items:[
      { k:"exec",   l:"Blotter",     i:"▤" },
      { k:"alerts", l:"Alerts",      i:"▲", badge:3 },
    ]},
  ];
  return (
    <div style={{
      width:212, background:"var(--bg-1)", borderRight:"1px solid var(--line)",
      display:"flex", flexDirection:"column", flexShrink:0
    }}>
      {/* brand */}
      <div style={{ padding:"16px 18px", display:"flex", alignItems:"center", gap:10, borderBottom:"1px solid var(--line)" }}>
        <div style={{
          width:28, height:28, borderRadius:7,
          background:"linear-gradient(135deg, var(--accent) 0%, var(--accent-d) 100%)",
          display:"flex", alignItems:"center", justifyContent:"center",
          color:"#fff", fontWeight:700, fontSize:14, fontFamily:"var(--mono)"
        }}>d</div>
        <div>
          <div style={{ fontSize:13, fontWeight:600, letterSpacing:"-0.01em" }}>Daub</div>
          <div className="mono mute" style={{ fontSize:9.5, letterSpacing:"0.08em", textTransform:"uppercase" }}>research · v0.4</div>
        </div>
      </div>

      <div style={{ padding:"12px 0", flex:1, overflow:"auto" }}>
        {groups.map(g => (
          <div key={g.g} style={{ marginBottom:14 }}>
            <div className="mute" style={{ padding:"4px 18px", fontSize:10, textTransform:"uppercase", letterSpacing:"0.08em", fontWeight:500 }}>{g.g}</div>
            {g.items.map(it => {
              const on = route===it.k;
              return (
                <div key={it.k} onClick={()=>setRoute(it.k)} style={{
                  margin:"1px 8px", padding:"7px 10px",
                  display:"flex", alignItems:"center", gap:10,
                  borderRadius: "var(--r-sm)",
                  background: on ? "var(--accent-bg)" : "transparent",
                  color: on ? "var(--accent-hi)" : "var(--fg-dim)",
                  cursor:"pointer",
                  fontSize:12.5,
                  fontWeight: on?500:400,
                  transition:"all 80ms"
                }} onMouseEnter={e=>{ if(!on) e.currentTarget.style.background="var(--bg-2)"; }}
                   onMouseLeave={e=>{ if(!on) e.currentTarget.style.background="transparent"; }}>
                  <span className="mono" style={{ width:16, textAlign:"center", color: on?"var(--accent)":"var(--fg-mute)" }}>{it.i}</span>
                  <span style={{ flex:1 }}>{it.l}</span>
                  {it.badge && <span className="pill" style={{ background:"var(--accent)", color:"#fff", fontSize:9, padding:"1px 6px" }}>{it.badge}</span>}
                </div>
              );
            })}
          </div>
        ))}
      </div>

      {/* footer */}
      <div style={{ padding:"12px 16px", borderTop:"1px solid var(--line)", display:"flex", alignItems:"center", gap:10 }}>
        <div style={{
          width:26, height:26, borderRadius:"50%",
          background:"var(--bg-3)", display:"flex", alignItems:"center", justifyContent:"center",
          fontSize:11, fontWeight:600
        }}>T</div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:11.5, fontWeight:500 }}>Tanmay D.</div>
          <div className="mute" style={{ fontSize:10 }}>Paper · $186.7k</div>
        </div>
        <span className="mono mute" style={{ fontSize:10 }}>⚙</span>
      </div>
    </div>
  );
}

/* ─── TopBar ─────────────────────────────────────────────────────────── */
function TopBar({ search, setSearch, clock }) {
  return (
    <div style={{
      height:50, display:"flex", alignItems:"center", gap:14,
      padding:"0 18px",
      background:"var(--bg)",
      borderBottom:"1px solid var(--line)"
    }}>
      <div style={{
        flex:1, maxWidth:520, height:34, display:"flex", alignItems:"center", gap:10,
        padding:"0 12px",
        background:"var(--bg-1)",
        border:"1px solid var(--line-2)",
        borderRadius: "var(--r-md)"
      }}>
        <span className="mute" style={{ fontSize:13 }}>⌕</span>
        <input placeholder="Search ticker, ask question, or run command" value={search} onChange={e=>setSearch(e.target.value)}/>
        <span className="kbd">⌘K</span>
      </div>

      <div style={{ flex:1 }}/>

      <div style={{ display:"flex", alignItems:"center", gap:8, fontSize:11 }}>
        <span className="dot live"/>
        <span className="dim">Market open</span>
        <span className="mute">·</span>
        <span className="mono">{clock}</span>
      </div>

      <button className="btn ghost">◐</button>
      <button className="btn ghost" style={{ position:"relative" }}>
        ▣
        <span style={{ position:"absolute", top:3, right:3, width:6, height:6, borderRadius:"50%", background:"var(--accent)" }}/>
      </button>
    </div>
  );
}

/* ─── Pulse Strip (replaces ticker tape) ─────────────────────────────── */
function PulseStrip() {
  const items = [
    { l:"S&P 500",   v:"5,842.3",  d:"+0.82%", up:true },
    { l:"Nasdaq",    v:"18,420",   d:"+1.14%", up:true },
    { l:"Dow",       v:"42,186",   d:"+0.36%", up:true },
    { l:"VIX",       v:"14.80",    d:"-3.90%", up:true },
    { l:"UST10",     v:"4.18%",    d:"-4bp",   up:true },
    { l:"DXY",       v:"101.4",    d:"-0.3%",  up:true },
    { l:"Brent",     v:"$71.80",   d:"-1.64%", up:false },
    { l:"BTC",       v:"$94,820",  d:"+2.41%", up:true },
    { l:"Breadth",   v:"312 / 186",d:"adv/dec",up:true },
  ];
  return (
    <div style={{
      display:"grid",
      gridTemplateColumns:`repeat(${items.length}, 1fr)`,
      gap:1, background:"var(--line)",
      border:"1px solid var(--line)",
      borderRadius:"var(--r-md)",
      overflow:"hidden"
    }}>
      {items.map((it,i)=>(
        <div key={i} style={{ padding:"10px 14px", background:"var(--card)" }}>
          <div className="mute" style={{ fontSize:10, letterSpacing:"0.04em", textTransform:"uppercase", fontWeight:500 }}>{it.l}</div>
          <div style={{ display:"flex", alignItems:"baseline", gap:7, marginTop:3 }}>
            <span className="mono" style={{ fontSize:13, fontWeight:500 }}>{it.v}</span>
            <span className={"mono " + (it.up?"up":"down")} style={{ fontSize:10.5 }}>{it.d}</span>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ─── Route: Dashboard ───────────────────────────────────────────────── */
function Dashboard() {
  // sector aggregation
  const sectMap = {};
  D.positions.forEach(p => {
    const tk = D.tickers.find(x=>x.t===p.t);
    const s = tk?.sect || "tech";
    sectMap[s] = (sectMap[s]||0) + p.mv;
  });
  const colorMap = { tech:"var(--s-tech)", fin:"var(--s-fin)", hlth:"var(--s-hlth)", indu:"var(--s-indu)", cons:"var(--s-cons)", ener:"var(--s-ener)", def:"var(--s-def)" };
  const slices = Object.entries(sectMap).map(([k,v])=>({ k, v, c: colorMap[k] }));

  return (
    <div style={{ padding:16, display:"flex", flexDirection:"column", gap:14 }}>
      <PulseStrip/>

      {/* hero KPIs */}
      <div style={{ display:"grid", gridTemplateColumns:"1.4fr 1fr 1fr 1fr", gap:14 }}>
        <Card>
          <div style={{ padding:"18px 22px" }}>
            <div style={{ display:"flex", alignItems:"baseline", gap:10 }}>
              <span className="mute" style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.06em" }}>Portfolio value</span>
              <span className="pill up" style={{ fontSize:10 }}>+{M.dailyPnlPct}% today</span>
            </div>
            <div className="mono" style={{ fontSize:30, fontWeight:600, marginTop:6, letterSpacing:"-0.02em" }}>
              ${M.portVal.toLocaleString(undefined,{maximumFractionDigits:2})}
            </div>
            <div style={{ display:"flex", gap:20, marginTop:10, fontSize:11 }}>
              <Kpi l="Today" v={`+$${M.dailyPnl.toFixed(0)}`} cls="up"/>
              <Kpi l="Cash"  v={`$${(M.cash/1000).toFixed(1)}k`}/>
              <Kpi l="Gross" v={`${((M.longExp+M.shortExp)*100).toFixed(0)}%`}/>
              <Kpi l="Sharpe (90d)" v={M.sharpe.toFixed(2)} cls="acc"/>
            </div>
          </div>
        </Card>

        <Card title="Win rate · 30d" bodyStyle={{ padding:"12px 16px 16px" }}>
          <div style={{ display:"flex", alignItems:"flex-end", gap:8 }}>
            <span className="mono up" style={{ fontSize:24, fontWeight:600 }}>67<span style={{ fontSize:14 }}>%</span></span>
            <span className="mute" style={{ fontSize:11, marginBottom:5 }}>of 486 trades</span>
          </div>
          <div style={{ display:"flex", gap:2, marginTop:10 }}>
            {Array.from({length:30}).map((_,i)=>{
              const hit = [0,3,4,6,7,9,10,11,13,14,16,17,19,20,22,23,25,26,27,29].includes(i);
              return <div key={i} style={{ flex:1, height:20, borderRadius:2, background: hit ? "var(--up)" : "var(--bg-3)" }}/>;
            })}
          </div>
          <div style={{ display:"flex", justifyContent:"space-between", marginTop:5, fontSize:9.5 }} className="mute">
            <span>30d ago</span><span>today</span>
          </div>
        </Card>

        <Card title="Max drawdown" bodyStyle={{ padding:"12px 16px 16px" }}>
          <div style={{ display:"flex", alignItems:"flex-end", gap:8 }}>
            <span className="mono down" style={{ fontSize:24, fontWeight:600 }}>{M.drawdown}<span style={{ fontSize:14 }}>%</span></span>
            <span className="mute" style={{ fontSize:11, marginBottom:5 }}>limit −10.0%</span>
          </div>
          <div className="bar" style={{ marginTop:14 }}>
            <div className="bar-inner" style={{ width:"28%", background:"var(--down)" }}/>
          </div>
          <div className="mute" style={{ fontSize:10.5, marginTop:6 }}>2.8% of 10% limit used</div>
        </Card>

        <Card title="Market regime" bodyStyle={{ padding:"12px 16px 16px" }}>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <span className="pill acc" style={{ fontSize:10 }}>◆ {M.regime}</span>
          </div>
          <div className="mono" style={{ fontSize:17, fontWeight:500, marginTop:8 }}>Risk-on forming</div>
          <div className="dim" style={{ fontSize:11, marginTop:4, lineHeight:1.45 }}>
            Fed dovish on 2026 path · 2s/10s un-inverts · conf {M.regimeConf.toFixed(2)}
          </div>
        </Card>
      </div>

      {/* Chart + allocation + regime gauge */}
      <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr 1fr", gap:14 }}>
        <Card title="Equity curve" sub="last 90 days"
          right={<div style={{ display:"flex", gap:4 }}>
            {["1D","5D","1M","3M","YTD","1Y","ALL"].map((p,i)=>(
              <button key={p} className={"btn " + (i===3?"active":"")}>{p}</button>
            ))}
          </div>}
          bodyStyle={{ padding:"14px 12px 8px" }}>
          <LineChart data={D.chartPts} h={200}/>
        </Card>

        <Card title="Allocation" sub="by sector" bodyStyle={{ padding:"10px 16px 14px" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <Donut slices={slices} size={120} inner={32}/>
            <div style={{ flex:1, display:"flex", flexDirection:"column", gap:4, fontSize:11 }}>
              {slices.sort((a,b)=>b.v-a.v).map(s=>{
                const tot = slices.reduce((x,y)=>x+y.v,0);
                return (
                  <div key={s.k} style={{ display:"flex", alignItems:"center", gap:6 }}>
                    <span style={{ width:8, height:8, borderRadius:2, background:s.c }}/>
                    <span style={{ flex:1, textTransform:"capitalize" }}>{s.k}</span>
                    <span className="mono mute">{((s.v/tot)*100).toFixed(0)}%</span>
                  </div>
                );
              })}
            </div>
          </div>
        </Card>

        <Card title="Market sentiment" sub="fear / greed" bodyStyle={{ padding:"12px 16px 14px" }}>
          <div style={{ display:"flex", justifyContent:"center" }}>
            <Gauge value={62} label="62 · Greed"/>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6, marginTop:4, fontSize:10.5 }}>
            <MiniStat l="VIX" v="14.8" d="−0.6" up/>
            <MiniStat l="Put/Call" v="0.78" d="−0.04" up/>
            <MiniStat l="Breadth" v="+126" d="adv" up/>
            <MiniStat l="Hi/Lo" v="48/12" d="52wk"/>
          </div>
        </Card>
      </div>

      {/* Positions + Thesis */}
      <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr", gap:14 }}>
        <Card title="Holdings" sub={`${D.positions.length} positions`}
              right={<><button className="btn">+ New trade</button></>}>
          <div style={{ overflow:"auto", maxHeight:360 }}>

/* ─── Route: Risk Radar ──────────────────────────────────────────────── */
function RiskRadar() {
  const tickers = D.positions.map(p=>p.t);
  const corr = (i,j) => { if (i===j) return 1; const s=(i*7+j*13+5)%100; return Math.round(((s/100)*1.4-0.4)*100)/100; };

  const [spx,setSpx] = React.useState(-10);
  const [rate,setRate] = React.useState(50);
  const [dxy,setDxy] = React.useState(2);
  const beta = { NVDA:1.8, AAPL:1.2, JPM:1.1, XOM:0.7, LLY:0.8, TSLA:2.1, GS:1.4 };
  const stress = D.positions.map(p => {
    const b = beta[p.t]||1, sg = p.side==="LONG"?1:-1;
    const eq = sg*p.mv*b*(spx/100);
    const rt = sg*p.mv*(b-1)*0.4*(rate/100);
    const fx = sg*p.mv*0.3*(dxy/100)*-1;
    return { ...p, b, eq, rt, fx, tot: eq+rt+fx };
  });
  const total = stress.reduce((s,r)=>s+r.tot,0);

  return (
    <div style={{ padding:16, display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
      <Card title="Correlation" sub="7 positions · 90d daily returns">
        <div style={{ padding:"14px 18px", overflow:"auto" }}>
          <table style={{ borderCollapse:"separate", borderSpacing:2, fontFamily:"var(--mono)", fontSize:10.5 }}>
            <thead><tr>
              <th></th>
              {tickers.map(t=><th key={t} style={{ padding:4, color:"var(--fg-mute)", fontWeight:500 }}>{t}</th>)}
            </tr></thead>
            <tbody>
              {tickers.map((r,i)=>(
                <tr key={r}>
                  <th style={{ padding:"4px 8px", textAlign:"left", color:"var(--fg)", fontWeight:500 }}>{r}</th>
                  {tickers.map((c,j)=>{
                    const v = corr(i,j), a=Math.abs(v);
                    const bg = v>=0 ? `rgba(52,211,153,${a.toFixed(2)})` : `rgba(248,113,113,${a.toFixed(2)})`;
                    return <td key={c} style={{

    const onMsg = (e) => {
      if (e.data?.type === "__activate_edit_mode") setTweaksOn(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweaksOn(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type:"__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);
  const setTweak = (k,v) => {
    const next = { ...tweaks, [k]:v };
    setTweaks(next);
    window.parent.postMessage({ type:"__edit_mode_set_keys", edits:{ [k]:v } }, "*");
  };

  const routeNames = {
    home:"Dashboard", signal:"Signal Desk", agents:"Agent Swarm",
    rsrch:"Research", risk:"Risk Radar", screen:"Screener",
    exec:"Blotter", alerts:"Alerts"
  };

  return (
    <div style={{ display:"flex", height:"100vh", background:"var(--bg)" }} data-screen-label={routeNames[route]}>
      <Sidebar route={route} setRoute={setRoute}/>
      <div style={{ flex:1, display:"flex", flexDirection:"column", minWidth:0 }}>
        <TopBar search={search} setSearch={setSearch} clock={clock}/>
        <div style={{ flex:1, overflow:"auto" }}>
          {route==="home"   && <Dashboard/>}
          {route==="signal" && <SignalDesk/>}
          {route==="agents" && <AgentSwarm/>}
          {route==="rsrch"  && <Research/>}
          {route==="risk"   && <RiskRadar/>}
          {route==="screen" && <Screener/>}
          {route==="exec"   && <Blotter/>}
          {route==="alerts" && <Alerts/>}
        </div>
      </div>

      {tweaksOn && (
        <div className="card" style={{ position:"fixed", right:20, bottom:20, width:260, zIndex:50, boxShadow:"0 10px 40px rgba(0,0,0,0.6)" }}>
          <div className="card-head"><h3>Tweaks</h3></div>
          <div style={{ padding:"14px 16px", display:"flex", flexDirection:"column", gap:12 }}>
            <div>
              <div className="mute" style={{ fontSize:10.5, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:6 }}>Accent</div>
              <div style={{ display:"flex", gap:4 }}>
                {["indigo","teal","lime","rose"].map(c=>(
                  <button key={c} onClick={()=>setTweak("accent",c)}
                    className={"btn " + (tweaks.accent===c?"active":"")} style={{ flex:1, textTransform:"capitalize" }}>{c}</button>
                ))}
              </div>
            </div>
            <div className="mute" style={{ fontSize:10, lineHeight:1.4 }}>
              Pick a brand accent. Up/down (green/red) stays fixed for P&L clarity.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Screener() {
  return (
    <div style={{ padding:16 }}>
      <Card title="Screener" sub="build your own filter">
        <div style={{ padding:"60px 24px", textAlign:"center", color:"var(--fg-mute)" }}>
          <div style={{ fontSize:36, color:"var(--accent)", opacity:0.5 }}>▣</div>
          <div style={{ marginTop:10 }}>Coming soon — combine agents + fundamentals + technicals</div>
        </div>
      </Card>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
